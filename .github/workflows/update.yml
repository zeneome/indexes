# regenerates the index csvs every saturday and commits any changes back to the repo
name: update

on:
  # saturday 00:00 utc, after the trading week closes
  schedule:
    - cron: "0 0 * * 6"
  # allow manual runs from the actions tab
  workflow_dispatch:

# let the built-in token push the data commit
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      # install pinned deps and regenerate every csv
      - run: pip install -r requirements.txt
      - run: cd src && python runner.py

      # commit and push only the data changes, stamped with the utc date
      - name: commit data changes
        run: |
          git config user.name "indexesbot"
          git config user.email "indexesbot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "$(date -u +%Y%m%d)"
            git push
          fi
